<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет — MentorSpace</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --cream: #FEFCF7; --white: #FFFFFF; --cream-2: #F7F3EB; --cream-3: #EDE8DC;
      --border: #EAE5D9; --text: #2C2822; --muted: #9B9083;
      --accent: #5C73F2; --accent-light: #EEF0FF; --accent-hover: #4A60E8;
      --success: #34C97A; --success-light: #EDFAF3; --danger: #F05252; --warning: #F59E0B;
      --radius: 16px; --radius-sm: 10px; --radius-lg: 24px;
      --shadow: 0 2px 20px rgba(44,40,34,0.07); --shadow-lg: 0 8px 40px rgba(44,40,34,0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--text); font-weight: 500; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    .nav { background: rgba(254,252,247,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 20px; }
    .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 2.5; }
    .logo span { color: var(--accent); }
    .nav-links { display: flex; align-items: center; gap: 8px; }
    .nav-links a { padding: 8px 16px; border-radius: var(--radius-sm); font-weight: 600; font-size: 15px; color: var(--muted); transition: 0.2s; }
    .nav-links a:hover { color: var(--text); background: var(--cream-2); }
    .btn-nav { background: var(--accent) !important; color: #fff !important; font-weight: 800 !important; }

    .dash-layout { max-width: 1100px; margin: 0 auto; padding: 36px 24px; display: grid; grid-template-columns: 240px 1fr; gap: 28px; align-items: start; }
    @media (max-width: 768px) { .dash-layout { grid-template-columns: 1fr; padding: 20px 16px; } }

    .dash-sidebar { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 20px; position: sticky; top: 88px; }
    .user-mini { display: flex; align-items: center; gap: 12px; padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .user-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; color: #fff; flex-shrink: 0; object-fit: cover; }
    .user-name { font-weight: 800; font-size: 14px; }
    .user-role { font-size: 12px; color: var(--muted); font-weight: 600; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); font-weight: 700; font-size: 14px; color: var(--muted); cursor: pointer; transition: 0.2s; margin-bottom: 2px; }
    .nav-item:hover { background: var(--cream-2); color: var(--text); }
    .nav-item.active { background: var(--accent-light); color: var(--accent); }
    .nav-item svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.5; flex-shrink: 0; }
    .nav-divider { height: 1px; background: var(--border); margin: 12px 0; }
    .nav-signout { color: var(--danger) !important; }
    .nav-signout:hover { background: #fff5f5 !important; }

    .dash-content { min-width: 0; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .panel-title { font-size: 22px; font-weight: 900; margin-bottom: 20px; }
    .card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 28px; margin-bottom: 20px; box-shadow: var(--shadow); }
    .card-title { font-size: 16px; font-weight: 900; margin-bottom: 16px; }

    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-weight: 700; font-size: 13px; margin-bottom: 6px; color: var(--text); }
    .form-hint { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 5px; }
    .form-input { width: 100%; padding: 11px 14px; background: var(--cream-2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 500; color: var(--text); transition: 0.2s; outline: none; }
    .form-input:focus { border-color: var(--accent); background: var(--white); box-shadow: 0 0 0 3px rgba(92,115,242,0.12); }
    .form-input:disabled { opacity: 0.5; cursor: not-allowed; }
    textarea.form-input { resize: vertical; min-height: 100px; }
    .char-count { font-size: 12px; color: var(--muted); font-weight: 600; text-align: right; margin-top: 4px; }

    .subject-wrap { position: relative; }
    .autocomplete { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-sm); box-shadow: var(--shadow-lg); z-index: 50; overflow: hidden; display: none; max-height: 180px; overflow-y: auto; }
    .autocomplete.open { display: block; }
    .ac-item { padding: 9px 14px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.15s; }
    .ac-item:hover { background: var(--accent-light); color: var(--accent); }

    .btn-primary { padding: 12px 24px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(92,115,242,0.35); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-secondary { padding: 12px 24px; background: var(--white); color: var(--text); border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; }
    .btn-secondary:hover { background: var(--cream-2); }
    .btn-danger { padding: 12px 24px; background: #fff5f5; color: var(--danger); border: 1.5px solid #fecaca; border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .spinner { width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-section { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
    .avatar-big { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .avatar-big-placeholder { width: 90px; height: 90px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 28px; color: #fff; flex-shrink: 0; }
    .avatar-upload-btn { padding: 9px 18px; background: var(--cream-2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; }
    .avatar-upload-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    #avatar-file { display: none; }

    .badge-verified { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: var(--success-light); border-radius: 100px; color: var(--success); font-weight: 800; font-size: 13px; }
    .badge-pending { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: var(--cream-2); border-radius: 100px; color: var(--muted); font-weight: 700; font-size: 13px; }

    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-weight: 700; font-size: 14px; color: var(--muted); }
    .info-value { font-weight: 700; font-size: 14px; }

    .request-card { background: var(--cream-2); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; }
    .request-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
    .request-name { font-weight: 800; font-size: 15px; }
    .request-date { font-size: 13px; color: var(--muted); font-weight: 600; }
    .request-contact { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .request-contact a { font-size: 14px; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 6px; }
    .request-msg { font-size: 14px; line-height: 1.6; color: var(--text); background: var(--white); border-radius: var(--radius-sm); padding: 10px 14px; }
    .request-status-done { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 800; color: var(--success); background: var(--success-light); padding: 3px 10px; border-radius: 100px; }
    .btn-mark-done { padding: 7px 14px; background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; transition: 0.2s; }
    .btn-mark-done:hover { border-color: var(--success); color: var(--success); background: var(--success-light); }

    .history-card { background: var(--cream-2); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; }
    .history-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 15px; color: #fff; flex-shrink: 0; }
    .history-info { flex: 1; min-width: 0; }
    .history-name { font-weight: 800; font-size: 14px; }
    .history-meta { font-size: 13px; color: var(--muted); font-weight: 600; }
    .btn-sm { padding: 6px 14px; background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; transition: 0.2s; }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

    .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 6px; }

    .role-switch-card { border: 1.5px dashed var(--border); border-radius: var(--radius-lg); padding: 24px; text-align: center; }
    .role-switch-card h3 { font-weight: 800; font-size: 17px; margin-bottom: 8px; }
    .role-switch-card p { color: var(--muted); font-size: 14px; margin-bottom: 16px; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--text); color: #fff; padding: 14px 24px; border-radius: var(--radius-sm); display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; box-shadow: var(--shadow-lg); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 9999; max-width: calc(100vw - 48px); }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.err { background: var(--danger); }

    .skeleton { background: linear-gradient(90deg, var(--cream-2) 25%, var(--cream-3) 50%, var(--cream-2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm); }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    @media (max-width: 768px) {
      .dash-sidebar { position: static; }
      .user-mini { padding-bottom: 12px; margin-bottom: 12px; }
      .dash-nav { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px; }
      .dash-nav .nav-item { white-space: nowrap; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="logo" href="index.html">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      Mentor<span>Space</span>
    </a>
    <div class="nav-links">
      <a href="search.html">Найти репетитора</a>
    </div>
  </div>
</nav>

<div class="dash-layout" id="dash-layout" style="display:none">
  <!-- SIDEBAR -->
  <aside class="dash-sidebar">
    <div class="user-mini">
      <div id="sb-avatar" class="user-avatar"></div>
      <div>
        <div class="user-name" id="sb-name">—</div>
        <div class="user-role" id="sb-role">—</div>
      </div>
    </div>
    <div class="dash-nav" id="dash-nav"></div>
  </aside>

  <!-- CONTENT -->
  <div class="dash-content" id="dash-panels"></div>
</div>

<div style="display:flex;align-items:center;justify-content:center;min-height:60vh" id="loading-screen">
  <div style="text-align:center">
    <div class="skeleton" style="width:80px;height:80px;border-radius:50%;margin:0 auto 16px"></div>
    <div class="skeleton" style="height:20px;width:160px;margin:0 auto 8px"></div>
    <div class="skeleton" style="height:14px;width:120px;margin:0 auto"></div>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-icon"></span><span id="toast-msg"></span></div>

<script>
const sb = supabase.createClient(
  'https://zskocbphdwcoskknyuru.supabase.co',
  'sb_publishable_Yxz_EllSK1ZTxfXfLj222Q_7CEOM2Yb'
);

const SUBJECTS = ['Математика','Алгебра','Геометрия','Физика','Химия','Биология','Английский язык','Русский язык','Литература','История','Обществознание','Информатика','Программирование','ЕГЭ/ОГЭ'];

let session = null;
let profile = null;
let tutorProfile = null;
let activeTab = null;

function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  document.getElementById('toast-icon').textContent = type === 'ok' ? '✓' : '✕';
  t.className = 'toast ' + type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function getInitials(name) { return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function avatarColor(str) {
  const colors = ['#5C73F2','#34C97A','#F59E0B','#F05252','#8B5CF6','#EC4899'];
  let h = 0; for (let c of (str||'x')) h = c.charCodeAt(0) + ((h<<5)-h);
  return colors[Math.abs(h) % colors.length];
}
function formatDate(d) { return new Date(d).toLocaleDateString('ru-RU', { day:'numeric', month:'long', year:'numeric' }); }

function setLoading(id, loading, text, loadText) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = loading;
  const sp = btn.querySelector('.spinner');
  const tx = btn.querySelector('[data-txt]');
  if (sp) sp.style.display = loading ? 'block' : 'none';
  if (tx) tx.textContent = loading ? (loadText || text) : text;
}

function switchTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item[data-tab]').forEach(i => i.classList.remove('active'));
  const panel = document.getElementById('panel-' + name);
  if (panel) panel.classList.add('active');
  const navItem = document.querySelector(`.nav-item[data-tab="${name}"]`);
  if (navItem) navItem.classList.add('active');
}

// ─── STUDENT DASHBOARD ───────────────────────────────────────

function buildStudentDash() {
  const color = avatarColor(profile.full_name);
  const initials = getInitials(profile.full_name);

  document.getElementById('sb-avatar').style.background = color;
  document.getElementById('sb-avatar').textContent = initials;
  document.getElementById('sb-name').textContent = profile.full_name;
  document.getElementById('sb-role').textContent = 'Ученик';

  document.getElementById('dash-nav').innerHTML = `
    <div class="nav-item active" data-tab="profile" onclick="switchTab('profile')">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Мой профиль
    </div>
    <div class="nav-item" data-tab="history" onclick="switchTab('history')">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      История заявок
    </div>
    <div class="nav-item" data-tab="my-reviews" onclick="switchTab('my-reviews')">
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Мои отзывы
    </div>
    <div class="nav-divider"></div>
    <div class="nav-item nav-signout" onclick="doSignOut()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Выйти
    </div>`;

  document.getElementById('dash-panels').innerHTML = `
    <!-- PROFILE -->
    <div class="tab-panel active" id="panel-profile">
      <div class="panel-title">Мой профиль</div>
      <div class="card">
        <div class="card-title">Личная информация</div>
        <div class="info-row"><span class="info-label">Имя</span><span class="info-value">${profile.full_name}</span></div>
        <div class="info-row"><span class="info-label">Email</span><span class="info-value">${session.user.email}</span></div>
        <div class="info-row"><span class="info-label">Роль</span><span class="info-value">Ученик 📚</span></div>
        <div class="info-row"><span class="info-label">На платформе с</span><span class="info-value">${formatDate(profile.created_at)}</span></div>
      </div>
      <div class="role-switch-card">
        <h3>🎓 Хочешь стать репетитором?</h3>
        <p>Создай анкету и начни получать заявки от учеников. Это бесплатно.</p>
        <button class="btn-primary" onclick="switchToTutor()">
          <span data-txt>Стать репетитором</span>
        </button>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="tab-panel" id="panel-history">
      <div class="panel-title">История заявок</div>
      <div id="history-list"><div class="skeleton" style="height:80px;margin-bottom:10px"></div><div class="skeleton" style="height:80px"></div></div>
    </div>

    <!-- MY REVIEWS -->
    <div class="tab-panel" id="panel-my-reviews">
      <div class="panel-title">Мои отзывы</div>
      <div id="my-reviews-list"><div class="skeleton" style="height:80px;margin-bottom:10px"></div></div>
    </div>`;

  loadHistory();
  loadMyReviews();
}

async function loadHistory() {
  const { data } = await sb
    .from('contact_requests')
    .select('*, tutor_profiles(subject, profiles!inner(full_name))')
    .eq('student_id', session.user.id)
    .order('created_at', { ascending: false });

  const el = document.getElementById('history-list');
  if (!el) return;
  if (!data || !data.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><h3>Заявок пока нет</h3><p><a href="search.html" style="color:var(--accent)">Найти репетитора →</a></p></div>`;
    return;
  }
  el.innerHTML = data.map(r => {
    const name = r.tutor_profiles?.profiles?.full_name || 'Репетитор';
    const subject = r.tutor_profiles?.subject || '—';
    const color = avatarColor(name);
    return `<div class="history-card">
      <div class="history-avatar" style="background:${color}">${getInitials(name)}</div>
      <div class="history-info">
        <div class="history-name">${name}</div>
        <div class="history-meta">📚 ${subject} · ${formatDate(r.created_at)}</div>
      </div>
      <a href="tutor.html?id=${r.tutor_id}" class="btn-sm">Профиль</a>
    </div>`;
  }).join('');
}

async function loadMyReviews() {
  const { data } = await sb
    .from('reviews')
    .select('*, tutor_profiles!tutor_id(subject, profiles!inner(full_name))')
    .eq('student_id', session.user.id)
    .order('created_at', { ascending: false });

  const el = document.getElementById('my-reviews-list');
  if (!el) return;
  if (!data || !data.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⭐</div><h3>Вы ещё не оставляли отзывов</h3><p>Оставьте отзыв после занятия с репетитором</p></div>`;
    return;
  }
  el.innerHTML = data.map(r => {
    const name = r.tutor_profiles?.profiles?.full_name || 'Репетитор';
    const subject = r.tutor_profiles?.subject || '—';
    const stars = '⭐'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
    return `<div class="history-card" style="flex-direction:column;align-items:flex-start">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;width:100%">
        <div class="history-avatar" style="background:${avatarColor(name)}">${getInitials(name)}</div>
        <div class="history-info">
          <div class="history-name">${name}</div>
          <div class="history-meta">📚 ${subject}</div>
        </div>
        <div style="margin-left:auto;font-size:16px">${stars}</div>
      </div>
      ${r.text ? `<div style="font-size:14px;line-height:1.6;color:var(--text)">${r.text}</div>` : ''}
    </div>`;
  }).join('');
}

async function switchToTutor() {
  try {
    await sb.from('profiles').update({ role: 'tutor' }).eq('id', session.user.id);
    const { data: existing } = await sb.from('tutor_profiles').select('id').eq('id', session.user.id).single();
    if (!existing) {
      await sb.from('tutor_profiles').insert({ id: session.user.id, social_link: '' });
    } else {
      await sb.from('tutor_profiles').update({ is_hidden: false }).eq('id', session.user.id);
    }
    showToast('Роль изменена! Теперь вы репетитор 🎓');
    setTimeout(() => location.reload(), 1000);
  } catch(e) {
    showToast('Не удалось сменить роль', 'err');
  }
}

// ─── TUTOR DASHBOARD ─────────────────────────────────────────

async function buildTutorDash() {
  const { data: tp } = await sb.from('tutor_profiles').select('*').eq('id', session.user.id).single();
  tutorProfile = tp;

  const color = avatarColor(profile.full_name);
  const initials = getInitials(profile.full_name);

  if (tp?.avatar_url) {
    const img = document.createElement('img');
    img.src = tp.avatar_url; img.alt = profile.full_name;
    img.className = 'user-avatar'; img.style.width = '44px'; img.style.height = '44px';
    document.getElementById('sb-avatar').replaceWith(img);
  } else {
    document.getElementById('sb-avatar').style.background = color;
    document.getElementById('sb-avatar').textContent = initials;
  }
  document.getElementById('sb-name').textContent = profile.full_name;
  document.getElementById('sb-role').textContent = profile.is_verified ? '✓ Верифицирован' : 'Репетитор';

  document.getElementById('dash-nav').innerHTML = `
    <div class="nav-item active" data-tab="tutor-profile" onclick="switchTab('tutor-profile')">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Моя анкета
    </div>
    <div class="nav-item" data-tab="requests" onclick="switchTab('requests'); loadRequests()">
      <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      Заявки
    </div>
    <div class="nav-item" data-tab="settings" onclick="switchTab('settings')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Настройки
    </div>
    <div class="nav-divider"></div>
    <div class="nav-item nav-signout" onclick="doSignOut()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Выйти
    </div>`;

  const verifiedBadge = profile.is_verified
    ? `<span class="badge-verified">✓ Верифицирован</span>`
    : `<span class="badge-pending">⏳ Ожидает верификации</span><div style="font-size:13px;color:var(--muted);font-weight:600;margin-top:6px">Укажите ссылку на соцсеть — мы проверим ваш профиль</div>`;

  document.getElementById('dash-panels').innerHTML = `
    <!-- TUTOR PROFILE -->
    <div class="tab-panel active" id="panel-tutor-profile">
      <div class="panel-title">Моя анкета</div>
      <div class="card">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
          ${verifiedBadge}
        </div>

        <div class="avatar-section">
          <div id="tp-avatar-wrap">
            ${tp?.avatar_url
              ? `<img class="avatar-big" src="${tp.avatar_url}" alt="Аватар" id="tp-avatar-img">`
              : `<div class="avatar-big-placeholder" id="tp-avatar-placeholder" style="background:${color}">${initials}</div>`}
          </div>
          <div>
            <button class="avatar-upload-btn" onclick="document.getElementById('avatar-file').click()">📷 Загрузить фото</button>
            <div style="font-size:12px;color:var(--muted);font-weight:600;margin-top:6px">JPG, PNG до 5 МБ</div>
          </div>
          <input type="file" id="avatar-file" accept="image/*" onchange="uploadAvatar(this)">
        </div>

        <div class="form-group">
          <label class="form-label">Предмет</label>
          <div class="subject-wrap">
            <input class="form-input" type="text" id="tp-subject" value="${tp?.subject || ''}" placeholder="Математика" oninput="showTPAC()" autocomplete="off">
            <div class="autocomplete" id="tp-ac"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">О себе</label>
          <textarea class="form-input" id="tp-about" rows="5" maxlength="1000" oninput="updateCharCount()" placeholder="Расскажите о своём опыте, методах и достижениях учеников...">${tp?.about || ''}</textarea>
          <div class="char-count"><span id="char-count">${(tp?.about || '').length}</span>/1000</div>
        </div>

        <div class="form-group">
          <label class="form-label">Цена за занятие, ₽</label>
          <input class="form-input" type="number" id="tp-price" value="${tp?.price || ''}" placeholder="1200" min="1" max="50000">
          <div class="form-hint">Средняя цена на платформе: 1200 ₽</div>
        </div>

        <div class="form-group">
          <label class="form-label">Ссылка на соцсеть *</label>
          <input class="form-input" type="url" id="tp-social" value="${tp?.social_link || ''}" placeholder="https://t.me/username">
          <div class="form-hint">Telegram, VK, Instagram — чтобы ученики могли убедиться что вы реальный человек</div>
        </div>

        <button class="btn-primary" id="btn-save-profile" onclick="saveTutorProfile()">
          <div class="spinner"></div>
          <span data-txt>Сохранить анкету</span>
        </button>

        ${tp?.id ? `<div style="margin-top:16px"><a href="tutor.html?id=${tp.id}" style="color:var(--accent);font-weight:700;font-size:14px">👁 Посмотреть как видят ученики →</a></div>` : ''}
      </div>
    </div>

    <!-- REQUESTS -->
    <div class="tab-panel" id="panel-requests">
      <div class="panel-title">Заявки от учеников</div>
      <div id="requests-list"><div class="skeleton" style="height:120px;margin-bottom:12px"></div><div class="skeleton" style="height:120px"></div></div>
    </div>

    <!-- SETTINGS -->
    <div class="tab-panel" id="panel-settings">
      <div class="panel-title">Настройки</div>

      <div class="card">
        <div class="card-title">Изменить имя</div>
        <div class="form-group">
          <label class="form-label">Имя</label>
          <input class="form-input" type="text" id="set-name" value="${profile.full_name}">
        </div>
        <button class="btn-primary" id="btn-save-name" onclick="saveName()">
          <div class="spinner"></div>
          <span data-txt>Сохранить</span>
        </button>
      </div>

      <div class="card">
        <div class="card-title">Изменить пароль</div>
        <div class="form-group">
          <label class="form-label">Новый пароль</label>
          <input class="form-input" type="password" id="set-pass" placeholder="Минимум 8 символов">
        </div>
        <button class="btn-primary" id="btn-save-pass" onclick="savePass()">
          <div class="spinner"></div>
          <span data-txt>Изменить пароль</span>
        </button>
      </div>

      <div class="card">
        <div class="card-title">Управление анкетой</div>
        <div style="display:flex;flex-direction:column;gap:12px">
          ${!tutorProfile?.is_hidden
            ? `<button class="btn-secondary" onclick="hideProfile()">🙈 Скрыть анкету</button>`
            : `<button class="btn-secondary" onclick="showProfile()">👁 Показать анкету</button>`}
        </div>
      </div>

      <div class="role-switch-card">
        <h3>📚 Хочешь стать учеником?</h3>
        <p>Твоя анкета будет скрыта, но не удалена. Ты сможешь вернуться.</p>
        <button class="btn-secondary" onclick="switchToStudent()">Сменить роль на Ученика</button>
      </div>
    </div>`;

  setupTPAutocomplete();
  loadRequests();
}

function updateCharCount() {
  const val = document.getElementById('tp-about')?.value || '';
  const el = document.getElementById('char-count');
  if (el) el.textContent = val.length;
}

function showTPAC() {
  const val = (document.getElementById('tp-subject')?.value || '').trim().toLowerCase();
  const ac = document.getElementById('tp-ac');
  if (!ac) return;
  if (!val) { ac.classList.remove('open'); return; }
  const matches = SUBJECTS.filter(s => s.toLowerCase().includes(val));
  if (!matches.length) { ac.classList.remove('open'); return; }
  ac.innerHTML = matches.map(s => `<div class="ac-item" onclick="selectTPSubject('${s}')">${s}</div>`).join('');
  ac.classList.add('open');
}

function selectTPSubject(val) {
  document.getElementById('tp-subject').value = val;
  document.getElementById('tp-ac').classList.remove('open');
}

function setupTPAutocomplete() {
  document.addEventListener('click', e => {
    if (!e.target.closest('.subject-wrap')) {
      const ac = document.getElementById('tp-ac');
      if (ac) ac.classList.remove('open');
    }
  });
}

async function uploadAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { showToast('Файл слишком большой. Максимум 5 МБ', 'err'); return; }

  showToast('Загружаем фото...');
  try {
    const ext = file.name.split('.').pop();
    const path = `${session.user.id}/${Date.now()}.${ext}`;
    const { error: upErr } = await sb.storage.from('avatars').upload(path, file, { upsert: true });
    if (upErr) throw upErr;
    const { data: { publicUrl } } = sb.storage.from('avatars').getPublicUrl(path);
    await sb.from('tutor_profiles').update({ avatar_url: publicUrl }).eq('id', session.user.id);

    const wrap = document.getElementById('tp-avatar-wrap');
    if (wrap) {
      wrap.innerHTML = `<img class="avatar-big" src="${publicUrl}" alt="Аватар">`;
    }
    showToast('Фото обновлено! 📸');
  } catch(e) {
    showToast('Не удалось загрузить фото', 'err');
  }
}

async function saveTutorProfile() {
  const subject = document.getElementById('tp-subject')?.value.trim();
  const about = document.getElementById('tp-about')?.value.trim();
  const price = parseInt(document.getElementById('tp-price')?.value);
  const social = document.getElementById('tp-social')?.value.trim();

  if (!social) { showToast('Укажите ссылку на соцсеть', 'err'); return; }
  if (social && !/^https?:\/\//.test(social)) { showToast('Ссылка должна начинаться с http:// или https://', 'err'); return; }
  if (price && price < 1) { showToast('Укажите корректную цену', 'err'); return; }

  setLoading('btn-save-profile', true, 'Сохранить анкету', 'Сохраняем...');
  try {
    const payload = { social_link: social, updated_at: new Date().toISOString() };
    if (subject) payload.subject = subject;
    if (about) payload.about = about;
    if (price) payload.price = price;
    await sb.from('tutor_profiles').update(payload).eq('id', session.user.id);
    showToast('Анкета сохранена! ✓');
  } catch(e) {
    showToast('Не удалось сохранить анкету', 'err');
  } finally {
    setLoading('btn-save-profile', false, 'Сохранить анкету');
  }
}

async function loadRequests() {
  const el = document.getElementById('requests-list');
  if (!el) return;
  const { data } = await sb
    .from('contact_requests')
    .select('*')
    .eq('tutor_id', session.user.id)
    .order('created_at', { ascending: false });

  if (!data || !data.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><h3>Заявок пока нет</h3><p>Заполните анкету, чтобы начать получать заявки</p></div>`;
    return;
  }
  el.innerHTML = data.map(r => `
    <div class="request-card" id="req-${r.id}">
      <div class="request-header">
        <div class="request-name">👤 ${r.student_name}</div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          ${r.status === 'done' ? `<span class="request-status-done">✓ Выполнено</span>` : `<button class="btn-mark-done" onclick="markDone('${r.id}')">Отметить выполнено</button>`}
          <span class="request-date">${formatDate(r.created_at)}</span>
        </div>
      </div>
      <div class="request-contact">
        <a href="mailto:${r.student_email}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          ${r.student_email}
        </a>
        ${r.student_phone ? `<a href="tel:${r.student_phone}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.57a16 16 0 0 0 6.29 6.29l1.63-1.63a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          ${r.student_phone}
        </a>` : ''}
      </div>
      ${r.message ? `<div class="request-msg">💬 ${r.message}</div>` : ''}
    </div>`).join('');
}

async function markDone(id) {
  try {
    await sb.from('contact_requests').update({ status: 'done' }).eq('id', id);
    const card = document.getElementById('req-' + id);
    if (card) {
      const btn = card.querySelector('.btn-mark-done');
      if (btn) btn.replaceWith(Object.assign(document.createElement('span'), { className: 'request-status-done', textContent: '✓ Выполнено' }));
    }
    showToast('Заявка отмечена как выполненная. Ученик теперь может оставить отзыв.');
  } catch(e) {
    showToast('Не удалось обновить статус', 'err');
  }
}

async function saveName() {
  const name = document.getElementById('set-name')?.value.trim();
  if (!name) { showToast('Введите имя', 'err'); return; }
  setLoading('btn-save-name', true, 'Сохранить', 'Сохраняем...');
  try {
    await sb.from('profiles').update({ full_name: name }).eq('id', session.user.id);
    showToast('Имя изменено! ✓');
    document.getElementById('sb-name').textContent = name;
  } catch(e) {
    showToast('Не удалось изменить имя', 'err');
  } finally {
    setLoading('btn-save-name', false, 'Сохранить');
  }
}

async function savePass() {
  const pass = document.getElementById('set-pass')?.value;
  if (!pass || pass.length < 8) { showToast('Пароль должен содержать минимум 8 символов', 'err'); return; }
  setLoading('btn-save-pass', true, 'Изменить пароль', 'Меняем...');
  try {
    const { error } = await sb.auth.updateUser({ password: pass });
    if (error) throw error;
    showToast('Пароль изменён! ✓');
    document.getElementById('set-pass').value = '';
  } catch(e) {
    showToast('Не удалось изменить пароль', 'err');
  } finally {
    setLoading('btn-save-pass', false, 'Изменить пароль');
  }
}

async function hideProfile() {
  if (!confirm('Скрыть анкету? Ученики не смогут вас найти.')) return;
  await sb.from('tutor_profiles').update({ is_hidden: true }).eq('id', session.user.id);
  showToast('Анкета скрыта');
  setTimeout(() => location.reload(), 800);
}

async function showProfile() {
  await sb.from('tutor_profiles').update({ is_hidden: false }).eq('id', session.user.id);
  showToast('Анкета снова видна ученикам');
  setTimeout(() => location.reload(), 800);
}

async function switchToStudent() {
  if (!confirm('Сменить роль на ученика? Ваша анкета будет скрыта.')) return;
  await sb.from('profiles').update({ role: 'student' }).eq('id', session.user.id);
  await sb.from('tutor_profiles').update({ is_hidden: true }).eq('id', session.user.id);
  showToast('Роль изменена на ученика');
  setTimeout(() => location.reload(), 1000);
}

async function doSignOut() {
  await sb.auth.signOut();
  window.location.href = 'auth.html';
}

// ─── INIT ─────────────────────────────────────────────────────

async function init() {
  const { data: { session: s } } = await sb.auth.getSession();
  if (!s) { window.location.href = 'auth.html'; return; }
  session = s;

  const { data: p } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
  if (!p) {
    const role = session.user.user_metadata?.role || 'student';
    const name = session.user.user_metadata?.full_name || session.user.email;
    await sb.from('profiles').insert({ id: session.user.id, role, full_name: name });
    if (role === 'tutor') await sb.from('tutor_profiles').insert({ id: session.user.id, social_link: '' });
    location.reload(); return;
  }
  profile = p;

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('dash-layout').style.display = 'grid';

  if (profile.role === 'tutor') {
    await buildTutorDash();
    switchTab('tutor-profile');
  } else {
    buildStudentDash();
    switchTab('profile');
  }
}

init();
</script>
